name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-bridge:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: |
        cd bridge-service/windows
        dotnet restore
    - name: Build Bridge Service
      run: |
        cd bridge-service/windows
        dotnet build -c Release --no-restore
    - name: Run Tests
      run: |
        cd bridge-service/windows
        dotnet test --no-build -c Release --verbosity normal

  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    - name: Build APK
      run: |
        cd mobile-app
        flutter pub get
        flutter build apk --release
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: vatsim-companion-app.apk
        path: mobile-app/build/app/outputs/flutter-apk/app-release.apk
