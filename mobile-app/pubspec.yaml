name: vatsim_companion
description: VATSIM Companion App for vPilot/xPilot

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 网络
  dio: ^5.3.0
  signalr_netcore: ^1.3.5

  # 推送通知
  flutter_local_notifications: ^17.2.4

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # UI
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0

  # 工具
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.1.12

  # 二维码扫码配对
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1

  # 后台保活(息屏维持 SignalR 连接)
  flutter_foreground_task: ^8.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
